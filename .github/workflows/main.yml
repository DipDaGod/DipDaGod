name: Update profile art

# Runs on a daily cron, on manual dispatch, and on pushes to main. This
# workflow ONLY touches Pipeline 3 (the contribution graph) - it never
# regenerates ascii-img.svg or info-card.svg, which are edited/regenerated
# by hand.

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pillow==10.4.0
          pip install numpy==1.26.4
          pip install opencv-python==4.10.0.84
          pip install requests==2.32.3
          pip install beautifulsoup4==4.12.3
      - name: Delete existing contribution graph
        run: rm -f contributions.svg

      - name: Regenerate contribution graph
        run: python scripts/update_contributions.py

      - name: Commit changes as github-actions[bot]
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "contributions.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"