name: Update Contribution Graph

on:
  schedule:
    - cron: "17 6 * * *"   
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Delete old contribution graph
        run: rm -f contrib-heatmap.svg

      - name: Generate new contribution graph
        run: python scripts/update_contributions.py

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: |
            scripts/data/contributions.json
            contrib-heatmap.svg
