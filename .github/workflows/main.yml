name: Update profile art

# Runs on a daily cron, on manual dispatch, and on pushes to main. This
# workflow ONLY touches Pipeline 3 (the contribution graph) - it never
# regenerates ascii-img.svg or info-card.svg, which are edited/regenerated
# by hand.
#
# One commit per run: delete the stale contributions.svg, regenerate it,
# then commit both the deletion and the new file together. The commit is
# explicitly authored as github-actions[bot] (not your own account), so
# this workflow's own commits never count towards YOUR contribution graph -
# otherwise the bot's commits would get scraped back into the very heatmap
# they're drawing, inflating it forever.
"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Delete existing contribution graph
        run: rm -f contributions.svg

      - name: Regenerate contribution graph
        run: python scripts/update_contributions.py

      - name: Commit changes as github-actions[bot]
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "scripts/data/contributions.json contributions.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"